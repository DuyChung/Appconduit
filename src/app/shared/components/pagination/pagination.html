<div class="container">
  <div class="page" [class.disabled]="pageActive() === 1" (click)="clickBackward()"><</div>

  @for (item of pages(); track $index) {
    @if (typeof item === 'number') {
      <div class="page" [class.active]="item === pageActive()" (click)="clickPage(item)">
        {{ item }}
      </div>
    } @else {
      <span class="dots">...</span>
    }
  }

  <div class="page" [class.disabled]="pageActive() === totalPages()" (click)="clickForward()">
    >
  </div>
</div>
