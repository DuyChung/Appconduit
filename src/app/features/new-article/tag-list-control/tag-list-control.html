<input
  type="text"
  class="form-control"
  placeholder="Enter tags"
  [value]="tagValue"
  (input)="onInput($any($event.target).value)"
  (keydown.enter)="addTag(); $event.preventDefault()"
  [disabled]="false"
/>
<div class="tag-list">
  @for (tag of tags; track tag; let i = $index) {
    <span class="tag-pill">
      <button type="button" class="remove-btn" (click)="removeTag(i)" [disabled]="false">x</button>
      {{ tag }}
    </span>
  }
</div>
