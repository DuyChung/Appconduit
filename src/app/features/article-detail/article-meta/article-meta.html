<div class="article-meta">

  <img [src]="article().author.image || 'avatar.jfif'" />

  <div class="info">
    <a class="author">{{ article().author.username }}</a>
    <span class="date">{{ article().createdAt | date:'medium' }}</span>
  </div>

  @if (isLoggedIn()) {

    <button
      class="follow-btn"
      [class.active]="following()"
      (click)="toggleFollow()"
    >
      {{ following() ? 'Unfollow' : 'Follow' }}
      {{ article().author.followCount }}
    </button>

    <button
      class="favorite-btn"
      [class.active]="favorited()"
      (click)="toggleFavorite()"
    >
      ❤️ Favorite {{ favoritesCount() }}
    </button>

  }

  <ng-content></ng-content>

</div>
